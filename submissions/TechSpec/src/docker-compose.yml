services:
  backend:
    build: ./backend
    container_name: specforge-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - sqlite-data:/app/data

  frontend:
    build: ./frontend
    container_name: specforge-frontend
    restart: unless-stopped
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000

  caddy:
    image: caddy:2-alpine
    container_name: specforge-caddy
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend

volumes:
  sqlite-data:
  caddy-data:
  caddy-config:
